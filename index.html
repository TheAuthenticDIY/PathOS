<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Career Path Navigator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      background: white;
      color: black;
      border-radius: 10px;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    select, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    button {
      background: #ff5a1f;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .path {
      display: flex;
      justify-content: space-around;
      margin-top: 30px;
      align-items: center;
    }

    .card {
      background: #f4f4f4;
      padding: 15px;
      border-radius: 10px;
      width: 25%;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    ul {
      list-style-type: none;
      padding: 0;
    }

    li {
      background: #ddd;
      margin: 5px;
      padding: 5px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1>Career Path Navigator</h1>
  <p>Map Your Path to Your Dream Job</p>

  <div class="container">
    <label>Current Status:</label>
    <select id="current">
      <option value="student">Student</option>
      <option value="data_analyst">Data Analyst</option>
    </select>

    <label>Target Career:</label>
    <select id="target">
      <option value="data_analyst">Data Analyst</option>
      <option value="data_scientist">Data Scientist</option>
      <option value="software_engineer">Software Engineer</option>
      <option value="product_manager">Product Manager</option>
      <option value="ui_ux">UI/UX Designer</option>
    </select>

    <br>
    <button onclick="generatePath()">Generate Career Path</button>

    <div id="output"></div>
  </div>

  <script>
    function generatePath() {
      const current = document.getElementById('current').value;
      const target = document.getElementById('target').value;

      let html = '<div class="path">';

      // DATA SCIENCE PATHS
      if (current === 'student' && target === 'data_scientist') {
        html += createCard('Student', ['Basic Math', 'Excel', 'Programming Basics']);
        html += arrow();
        html += createCard('Data Analyst', ['SQL', 'Data Visualization', 'Statistics']);
        html += arrow();
        html += createCard('Data Scientist', ['Machine Learning', 'Python', 'Deep Learning']);
      }

      else if (current === 'data_analyst' && target === 'data_scientist') {
        html += createCard('Data Analyst', ['SQL', 'Excel', 'Visualization']);
        html += arrow();
        html += createCard('Senior Data Analyst', ['Advanced SQL', 'Python', 'BI Tools']);
        html += arrow();
        html += createCard('Data Scientist', ['ML', 'Statistics', 'Deep Learning']);
      }

      // SOFTWARE ENGINEER
      else if (current === 'student' && target === 'software_engineer') {
        html += createCard('Student', ['Programming Basics', 'Logic Building']);
        html += arrow();
        html += createCard('Junior Developer', ['JavaScript', 'Git', 'Web Basics']);
        html += arrow();
        html += createCard('Software Engineer', ['DSA', 'System Design', 'Backend/Frontend']);
      }

      // PRODUCT MANAGER
      else if (current === 'student' && target === 'product_manager') {
        html += createCard('Student', ['Business Basics', 'Communication']);
        html += arrow();
        html += createCard('Business Analyst', ['Market Research', 'Data Analysis']);
        html += arrow();
        html += createCard('Product Manager', ['Product Strategy', 'User Research', 'Roadmapping']);
      }

      // UI/UX DESIGNER
      else if (current === 'student' && target === 'ui_ux') {
        html += createCard('Student', ['Creativity', 'Design Basics']);
        html += arrow();
        html += createCard('Junior Designer', ['Figma', 'Wireframing', 'Prototyping']);
        html += arrow();
        html += createCard('UI/UX Designer', ['User Research', 'UX Principles', 'Design Systems']);
      }

      // DATA ANALYST
      else if (current === 'student' && target === 'data_analyst') {
        html += createCard('Student', ['Math Basics', 'Excel']);
        html += arrow();
        html += createCard('Data Analyst', ['SQL', 'Visualization', 'Statistics']);
      }

      else {
        html += '<p>No path defined yet.</p>';
      }

      html += '</div>';
      document.getElementById('output').innerHTML = html;
    }

    function createCard(title, skills) {
      let card = `<div class="card"><h3>${title}</h3><ul>`;
      skills.forEach(skill => {
        card += `<li>${skill}</li>`;
      });
      card += '</ul></div>';
      return card;
    }

    function arrow() {
      return '<div style="font-size:24px;">➡️</div>';
    }
  </script>

</body>
</html>
